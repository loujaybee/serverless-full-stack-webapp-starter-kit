tasks:
  open-ports:
    name: Open ports
    description: Expose ports in the Ona sidebar.
    command: |
      ona environment port open 3010 --name "Next.js Dev Server"
      ona environment port open 5432 --name "PostgreSQL"
    triggeredBy:
      - postDevcontainerStart

  install-deps:
    name: Install dependencies
    description: Install npm dependencies for webapp and cdk packages.
    command: |
      cd webapp && npm ci
      cd ../cdk && rm -rf node_modules && npm ci
    triggeredBy:
      - postDevcontainerStart

  bootstrap-env:
    name: Bootstrap webapp .env.local
    description: |
      Seed webapp/.env.local from .env.local.example so the app runs in
      LOCAL_DEV_MODE (auth bypassed, AWS calls stubbed) without requiring
      any external dependencies.
    command: |
      if [ ! -f webapp/.env.local ]; then
        cp webapp/.env.local.example webapp/.env.local
        echo "Created webapp/.env.local from example (LOCAL_DEV_MODE=true)."
      else
        echo "webapp/.env.local already exists; leaving as-is."
      fi
    triggeredBy:
      - postDevcontainerStart

  db-push:
    name: Sync database schema
    description: Push Prisma schema to local PostgreSQL.
    command: |
      until docker compose exec -T postgres pg_isready -U root; do
        echo "Waiting for postgres..."
        sleep 2
      done
      cd webapp && npx prisma db push
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - install-deps

services:
  postgres:
    name: PostgreSQL
    description: Local PostgreSQL database via Docker Compose.
    triggeredBy:
      - postDevcontainerStart
    commands:
      start: docker compose up --wait && docker compose logs -f postgres
      ready: docker compose exec -T postgres pg_isready -U root
      stop: docker compose down

  webapp:
    name: Next.js Dev Server
    description: Next.js development server on port 3010.
    triggeredBy:
      - postDevcontainerStart
    commands:
      start: |
        until [ -f webapp/node_modules/.bin/next ]; do
          echo "Waiting for node_modules..."
          sleep 2
        done
        # Ensure .env.local exists in case bootstrap-env hasn't run yet.
        if [ ! -f webapp/.env.local ]; then
          cp webapp/.env.local.example webapp/.env.local
        fi
        cd webapp && npm run dev
      ready: curl -sf -o /dev/null http://localhost:3010
